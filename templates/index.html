<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WGS84 ↔ 国家2000 双向坐标转换工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .tab-content {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .log-area {
            margin-top: 30px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            height: 200px;
            overflow-y: auto;
            background-color: #f8f9fa;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .result-area {
            min-height: 150px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-top: 10px;
        }
        .table-responsive {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .batch-controls {
            margin-bottom: 20px;
        }
        .conversion-direction {
            margin-bottom: 25px;
            padding: 15px;
            background-color: #e9f5ff;
            border-radius: 8px;
        }
        .direction-label {
            font-weight: bold;
            margin-right: 15px;
        }
        .input-group {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <h1 class="text-center mb-4">WGS84经纬度 ↔ 国家2000高斯投影 双向转换工具</h1>

    <!-- 标签页导航 -->
    <ul class="nav nav-tabs" id="converterTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="single-tab" data-bs-toggle="tab" data-bs-target="#single" type="button" role="tab">单点转换（常用）</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="batch-tab" data-bs-toggle="tab" data-bs-target="#batch" type="button" role="tab">批量转换</button>
        </li>
    </ul>

    <!-- 标签页内容 -->
    <div class="tab-content" id="converterTabsContent">
        <!-- 单点转换 -->
        <div class="tab-pane fade show active" id="single" role="tabpanel">
            <!-- 转换方向选择 -->
            <div class="conversion-direction">
                <span class="direction-label">转换方向：</span>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="singleDirection" id="wgs2cgcs" value="wgs2cgcs" checked>
                    <label class="form-check-label" for="wgs2cgcs">WGS84经纬度 → 国家2000高斯投影</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="singleDirection" id="cgcs2wgs" value="cgcs2wgs">
                    <label class="form-check-label" for="cgcs2wgs">国家2000高斯投影 → WGS84经纬度</label>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <!-- 公共配置 -->
                    <div class="form-group">
                        <label for="bandTypeSingle" class="form-label fw-bold">分带类型</label>
                        <select class="form-select" id="bandTypeSingle">
                            <option value="3°分带" selected>3°分带（高频使用）</option>
                            <option value="6°分带">6°分带（低频使用）</option>
                        </select>
                    </div>

                    <div class="form-group form-check">
                        <input type="checkbox" class="form-check-input" id="withBandSingle">
                        <label class="form-check-label" for="withBandSingle">启用带号（默认不启用）</label>
                    </div>

                    <!-- 动态输入区域（根据转换方向切换） -->
                    <div id="wgsInputGroup">
                        <div class="form-group">
                            <label for="longitude" class="form-label">WGS84经度（°E）</label>
                            <input type="text" class="form-control" id="longitude" placeholder="示例：118.182174（范围：72.0-135.0）">
                        </div>

                        <div class="form-group">
                            <label for="latitude" class="form-label">WGS84纬度（°N）</label>
                            <input type="text" class="form-control" id="latitude" placeholder="示例：35.519406（范围：0.0-54.0）">
                        </div>
                    </div>

                    <div id="cgcsInputGroup" style="display: none;">
                        <div class="form-group">
                            <label for="cgcsX" class="form-label">国家2000 X坐标（米）</label>
                            <input type="text" class="form-control" id="cgcsX" placeholder="示例：38521456.789">
                        </div>

                        <div class="form-group">
                            <label for="cgcsY" class="form-label">国家2000 Y坐标（米）</label>
                            <input type="text" class="form-control" id="cgcsY" placeholder="示例：54321.678">
                        </div>

                        <div class="form-group">
                            <label for="bandNumSingle" class="form-label">带号（必填）</label>
                            <input type="text" class="form-control" id="bandNumSingle" placeholder="示例：38（3°分带：25-45；6°分带：13-23）">
                        </div>
                    </div>

                    <div class="form-group text-center">
                        <button class="btn btn-primary btn-lg" id="convertSingleBtn">执行转换</button>
                    </div>
                </div>

                <div class="col-md-6">
                    <h5>转换结果</h5>
                    <div class="result-area" id="singleResult">
                        转换结果将显示在这里，可直接复制...
                    </div>
                    <div class="text-end text-muted mt-2">
                        ✅ 结果可直接复制 | 📌 保留3-6位小数，确保精度
                    </div>
                </div>
            </div>
        </div>

        <!-- 批量转换 -->
        <div class="tab-pane fade" id="batch" role="tabpanel">
            <!-- 转换方向选择 -->
            <div class="conversion-direction">
                <span class="direction-label">转换方向：</span>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="batchDirection" id="batchWgs2cgcs" value="wgs2cgcs" checked>
                    <label class="form-check-label" for="batchWgs2cgcs">WGS84经纬度 → 国家2000高斯投影</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="batchDirection" id="batchCgcs2wgs" value="cgcs2wgs">
                    <label class="form-check-label" for="batchCgcs2wgs">国家2000高斯投影 → WGS84经纬度</label>
                </div>
            </div>

            <div class="batch-controls">
                <div class="row">
                    <div class="col-md-3">
                        <label for="bandTypeBatch" class="form-label fw-bold">分带类型</label>
                        <select class="form-select" id="bandTypeBatch">
                            <option value="3°分带" selected>3°分带（高频使用）</option>
                            <option value="6°分带">6°分带（低频使用）</option>
                        </select>
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="withBandBatch">
                            <label class="form-check-label" for="withBandBatch">启用带号</label>
                        </div>
                    </div>

                    <div class="col-md-4 d-flex align-items-end">
                        <button class="btn btn-secondary" id="exportTemplateBtn">导出参考模板</button>
                        <select class="form-select ms-2" id="templateType" style="width: auto;">
                            <option value="xlsx">Excel</option>
                            <option value="csv">CSV</option>
                            <option value="txt">TXT</option>
                        </select>
                        <span id="templateHint" class="ms-2 text-muted">（含经度/纬度列）</span>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-md-8">
                        <label for="fileInput" class="form-label">选择数据文件</label>
                        <input type="file" class="form-control" id="fileInput" accept=".xlsx,.csv,.txt">
                        <small id="fileHint" class="text-muted">支持.xlsx/.csv/.txt，需包含'经度'/'纬度'列（必填）</small>
                    </div>

                    <div class="col-md-4 d-flex align-items-end">
                        <button class="btn btn-primary" id="startBatchBtn">开始批量转换</button>
                        <button class="btn btn-success ms-2" id="exportResultsBtn" disabled>导出转换结果</button>
                    </div>
                </div>

                <div class="row mt-2">
                    <div class="col-md-12">
                        <div id="batchStatus" class="text-muted">状态：未选择文件</div>
                    </div>
                </div>
            </div>

            <h5>转换结果预览（最多显示50条）</h5>
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>输入数据</th>
                            <th>输出结果</th>
                            <th>转换状态</th>
                            <th>备注</th>
                        </tr>
                    </thead>
                    <tbody id="batchResultsTable">
                        <!-- 结果将通过JavaScript动态填充 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 日志区域 -->
    <div class="log-area">
        <h5>操作日志</h5>
        <div id="logContent">
            <div>✅ 程序启动成功，支持双向转换</div>
            <div>📌 支持格式：Excel(.xlsx)、CSV(.csv)、TXT(.txt)</div>
            <div>🔄 转换方向：WGS84经纬度 ↔ 国家2000高斯投影</div>
        </div>
        <button class="btn btn-sm btn-outline-secondary mt-2" id="clearLogBtn">清空日志</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 全局变量存储临时文件名称和源类型
        let tempFileName = null;
        let batchSourceType = 'wgs84';

        // 添加日志
        function addLog(message) {
            const logContent = document.getElementById('logContent');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.innerHTML = `[${timestamp}] ${message}`;
            logContent.appendChild(logEntry);
            logContent.scrollTop = logContent.scrollHeight;
        }

        // 清空日志
        document.getElementById('clearLogBtn').addEventListener('click', () => {
            document.getElementById('logContent').innerHTML = '';
            addLog('日志已清空');
        });

        // 单点转换方向切换
        const wgs2cgcsRadio = document.getElementById('wgs2cgcs');
        const cgcs2wgsRadio = document.getElementById('cgcs2wgs');
        const wgsInputGroup = document.getElementById('wgsInputGroup');
        const cgcsInputGroup = document.getElementById('cgcsInputGroup');

        wgs2cgcsRadio.addEventListener('change', () => {
            if (wgs2cgcsRadio.checked) {
                wgsInputGroup.style.display = 'block';
                cgcsInputGroup.style.display = 'none';
                addLog('🔄 转换方向切换为：WGS84经纬度 → 国家2000高斯投影');
            }
        });

        cgcs2wgsRadio.addEventListener('change', () => {
            if (cgcs2wgsRadio.checked) {
                wgsInputGroup.style.display = 'none';
                cgcsInputGroup.style.display = 'block';
                addLog('🔄 转换方向切换为：国家2000高斯投影 → WGS84经纬度');
            }
        });

        // 单点转换
        document.getElementById('convertSingleBtn').addEventListener('click', async () => {
            let sourceType, lonX, latY, bandNum;

            // 获取转换方向和输入数据
            if (wgs2cgcsRadio.checked) {
                sourceType = 'wgs84';
                const longitude = document.getElementById('longitude').value.trim();
                const latitude = document.getElementById('latitude').value.trim();

                if (!longitude || !latitude) {
                    alert('请输入经度和纬度');
                    return;
                }
                lonX = longitude;
                latY = latitude;
            } else {
                sourceType = 'cgcs2000';
                const cgcsX = document.getElementById('cgcsX').value.trim();
                const cgcsY = document.getElementById('cgcsY').value.trim();
                bandNum = document.getElementById('bandNumSingle').value.trim();

                if (!cgcsX || !cgcsY || !bandNum) {
                    alert('请输入X坐标、Y坐标和带号');
                    return;
                }
                lonX = cgcsX;
                latY = cgcsY;
            }

            const bandType = document.getElementById('bandTypeSingle').value;
            const withBand = document.getElementById('withBandSingle').checked;

            try {
                addLog(`开始单点转换（方向：${sourceType === 'wgs84' ? 'WGS84→国家2000' : '国家2000→WGS84'}）`);
                const response = await fetch('/convert_single', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        sourceType,
                        lonX,
                        latY,
                        bandType,
                        withBand,
                        bandNum  // 仅国家2000→WGS84时存在
                    })
                });

                const result = await response.json();

                if (result.status === 'error') {
                    document.getElementById('singleResult').textContent = `错误：${result.message}`;
                    addLog(`❌ 转换失败：${result.message}`);
                } else {
                    const data = result.result;
                    let resultText;

                    if (sourceType === 'wgs84') {
                        // WGS84→国家2000 结果
                        resultText = `
转换成功！（WGS84→国家2000）
分带号：${data.band_num}
中央子午线：${data.central_lon}°
国家2000 X坐标：${data.x.toFixed(3)} 米
国家2000 Y坐标：${data.y.toFixed(3)} 米
XY合并：${data.combined}
                        `.trim();
                    } else {
                        // 国家2000→WGS84 结果
                        resultText = `
转换成功！（国家2000→WGS84）
分带号：${data.band_num}
中央子午线：${data.central_lon}°
WGS84经度：${data.longitude.toFixed(6)} °E
WGS84纬度：${data.latitude.toFixed(6)} °N
经纬度合并：${data.combined}
                        `.trim();
                    }

                    document.getElementById('singleResult').textContent = resultText;
                    addLog(`✅ 单点转换成功：输入=${lonX},${latY} → 输出=${data.combined}`);
                }
            } catch (error) {
                document.getElementById('singleResult').textContent = `转换出错：${error.message}`;
                addLog(`❌ 转换出错：${error.message}`);
            }
        });

        // 批量转换方向切换
        const batchWgs2cgcs = document.getElementById('batchWgs2cgcs');
        const batchCgcs2wgs = document.getElementById('batchCgcs2wgs');
        const templateHint = document.getElementById('templateHint');
        const fileHint = document.getElementById('fileHint');

        batchWgs2cgcs.addEventListener('change', () => {
            if (batchWgs2cgcs.checked) {
                batchSourceType = 'wgs84';
                templateHint.textContent = '（含经度/纬度列）';
                fileHint.textContent = '支持.xlsx/.csv/.txt，需包含\'经度\'/\'纬度\'列（必填）';
                addLog('🔄 批量转换方向切换为：WGS84经纬度 → 国家2000高斯投影');
            }
        });

        batchCgcs2wgs.addEventListener('change', () => {
            if (batchCgcs2wgs.checked) {
                batchSourceType = 'cgcs2000';
                templateHint.textContent = '（含X坐标/Y坐标/带号列）';
                fileHint.textContent = '支持.xlsx/.csv/.txt，需包含\'X坐标\'/\'Y坐标\'/\'带号\'列（必填）';
                addLog('🔄 批量转换方向切换为：国家2000高斯投影 → WGS84经纬度');
            }
        });

        // 导出模板
        document.getElementById('exportTemplateBtn').addEventListener('click', () => {
            const templateType = document.getElementById('templateType').value;
            window.location.href = `/export_template?type=${templateType}&source=${batchSourceType}`;
            addLog(`📋 导出${batchSourceType === 'wgs84' ? 'WGS84→国家2000' : '国家2000→WGS84'}格式模板（${templateType.toUpperCase()}）`);
        });

        // 批量转换
        document.getElementById('startBatchBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) {
                alert('请选择数据文件');
                return;
            }

            const bandType = document.getElementById('bandTypeBatch').value;
            const withBand = document.getElementById('withBandBatch').checked;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('sourceType', batchSourceType);
            formData.append('bandType', bandType);
            formData.append('withBand', withBand);

            try {
                document.getElementById('batchStatus').textContent = '状态：正在处理...';
                addLog(`开始批量转换（方向：${batchSourceType === 'wgs84' ? 'WGS84→国家2000' : '国家2000→WGS84'}）`);

                const response = await fetch('/convert_batch', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                const tableBody = document.getElementById('batchResultsTable');
                tableBody.innerHTML = '';

                if (result.status === 'error') {
                    document.getElementById('batchStatus').textContent = `状态：处理失败`;
                    addLog(`❌ 批量转换失败：${result.message}`);
                    alert(`处理失败：${result.message}`);
                    return;
                }

                // 填充表格
                result.results.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${item.index}</td>
                        <td>${item.input}</td>
                        <td>${item.output}</td>
                        <td class="${item.status === '成功' ? 'text-success' : 'text-danger'}">${item.status}</td>
                        <td>${item.note || item.message}</td>
                    `;
                    tableBody.appendChild(row);
                });

                // 更新状态和按钮
                tempFileName = result.temp_file;
                document.getElementById('batchStatus').textContent = `状态：处理完成，共${result.total}条记录`;
                document.getElementById('exportResultsBtn').disabled = false;
                addLog(`✅ 批量转换完成，共处理${result.total}条记录（成功${result.results.filter(item => item.status === '成功').length}条）`);
            } catch (error) {
                document.getElementById('batchStatus').textContent = `状态：处理出错`;
                addLog(`❌ 批量转换出错：${error.message}`);
                alert(`处理出错：${error.message}`);
            }
        });

        // 导出批量结果
        document.getElementById('exportResultsBtn').addEventListener('click', () => {
            if (tempFileName) {
                window.location.href = `/export_results/${tempFileName}`;
                addLog(`📋 导出批量转换结果（方向：${batchSourceType === 'wgs84' ? 'WGS84→国家2000' : '国家2000→WGS84'}）`);
            }
        });
    </script>
</body>
</html>
